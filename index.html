<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Quiz</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#e0e0e0; font-family:'Inter',-apple-system,sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; overflow-x:hidden; }

#header { width:100%; background:rgba(255,255,255,0.03); border-bottom:1px solid rgba(255,255,255,0.07); padding:10px 20px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
#header h1 { font-size:15px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; background:linear-gradient(135deg,#fff,#777); -webkit-background-clip:text; -webkit-text-fill-color:transparent; white-space:nowrap; }
#stats { display:flex; gap:8px; align-items:center; }
.stat { text-align:center; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:5px 12px; min-width:60px; }
.stat-val { font-size:17px; font-weight:700; color:#fff; line-height:1; }
.stat-lbl { font-size:9px; color:#555; margin-top:2px; letter-spacing:.06em; text-transform:uppercase; }
#timer-val { color:#e8c366; }
#timer-val.urgent { color:#FF3B30; animation:pulse .5s infinite alternate; }
@keyframes pulse { from{opacity:1}to{opacity:.4} }
#region-badge { background:rgba(100,160,255,0.15); border:1px solid rgba(100,160,255,0.3); border-radius:6px; padding:4px 10px; font-size:11px; color:#64a0ff; letter-spacing:.04em; }
#controls { display:flex; gap:8px; align-items:center; }
#input-box { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15); border-radius:10px; padding:7px 13px; color:#fff; font-size:14px; font-family:inherit; width:200px; outline:none; transition:border .2s; }
#input-box:focus { border-color:rgba(255,255,255,0.4); }
#input-box.correct { border-color:#30d158; animation:flashG .4s; }
@keyframes flashG { 0%,100%{background:rgba(255,255,255,.07)}50%{background:rgba(48,209,88,.2)} }

.btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); border-radius:8px; color:#fff; font-size:11px; font-family:inherit; font-weight:600; letter-spacing:.05em; padding:7px 13px; cursor:pointer; transition:background .15s; white-space:nowrap; }
.btn:hover { background:rgba(255,255,255,0.14); }
.btn.primary { background:rgba(48,209,88,0.2); border-color:rgba(48,209,88,0.4); color:#30d158; }
.btn.primary:hover { background:rgba(48,209,88,0.3); }
.btn.gold { background:rgba(232,195,102,0.15); border-color:rgba(232,195,102,0.35); color:#e8c366; }
.btn.gold:hover { background:rgba(232,195,102,0.25); }

#progress-bar { height:3px; background:rgba(255,255,255,0.06); width:100%; }
#progress-fill { height:100%; background:linear-gradient(90deg,#30d158,#e8c366); transition:width .3s; }

#map-wrap { width:100%; flex:1; position:relative; background:#0a1628; }
#map-wrap svg { width:100%; display:block; cursor:default; }

.country { stroke:#1e3a5f; stroke-width:0.4px; fill:#1a3a5c; transition:fill .25s; }
.country.active { fill:#2a5080; stroke:#3a7abf; stroke-width:0.5px; }
.country.found { stroke-width:0.7px; }
.country.missed { fill:rgba(255,59,48,0.35) !important; stroke:rgba(255,59,48,0.7) !important; }
.country.active:hover { fill:#3a6090; cursor:default; }

.graticule { fill:none; stroke:#111e2e; stroke-width:0.3px; }
.sphere { fill:#071422; }

.overlay { position:fixed; inset:0; background:rgba(5,8,15,.96); display:flex; align-items:center; justify-content:center; z-index:100; backdrop-filter:blur(12px); }
.card { background:#0f1520; border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:32px 40px; text-align:center; }
.card h2 { font-size:20px; font-weight:700; margin-bottom:6px; background:linear-gradient(135deg,#fff,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.card p { color:#555; font-size:12px; margin-bottom:20px; }

#region-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:20px; }
.region-btn { background:rgba(255,255,255,0.04); border:1.5px solid rgba(255,255,255,0.09); border-radius:10px; padding:10px 8px; cursor:pointer; font-size:12px; font-family:inherit; color:#aaa; transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:4px; }
.region-btn:hover { border-color:rgba(255,255,255,0.25); color:#fff; }
.region-btn.selected { border-color:#64a0ff; color:#64a0ff; background:rgba(100,160,255,0.1); }
.region-btn .r-emoji { font-size:18px; }
.region-btn .r-count { font-size:9px; color:#555; }
.region-btn.selected .r-count { color:#64a0ff99; }

.section-title { font-size:10px; color:#555; letter-spacing:.08em; text-transform:uppercase; margin-bottom:10px; text-align:left; }
.time-opts { display:flex; gap:8px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
.time-opt { background:rgba(255,255,255,0.05); border:1.5px solid rgba(255,255,255,0.1); border-radius:8px; padding:8px 14px; cursor:pointer; font-size:12px; font-family:inherit; color:#aaa; transition:all .15s; }
.time-opt:hover { border-color:rgba(255,255,255,0.3); color:#fff; }
.time-opt.selected { border-color:#e8c366; color:#e8c366; background:rgba(232,195,102,0.1); }
.custom-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:20px; }
.custom-row input { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15); border-radius:8px; color:#fff; font-size:13px; font-family:inherit; padding:6px 10px; width:70px; text-align:center; outline:none; }
.custom-row label { color:#555; font-size:12px; }
#player-name-wrap { margin-bottom:20px; }
#player-name { width:100%; background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15); border-radius:10px; padding:9px 14px; color:#fff; font-size:14px; font-family:inherit; text-align:center; outline:none; }

#end-screen .card { min-width:400px; max-width:520px; }
#score-big { font-size:52px; font-weight:800; color:#e8c366; line-height:1; margin:12px 0 4px; }
#score-sub { color:#555; font-size:12px; margin-bottom:14px; }
#found-list { display:flex; flex-wrap:wrap; gap:5px; margin:10px 0; max-height:100px; overflow-y:auto; justify-content:center; }
.found-tag { background:rgba(48,209,88,0.1); border:1px solid rgba(48,209,88,0.25); border-radius:5px; padding:2px 8px; font-size:10px; color:#30d158; }
#missed-wrap { text-align:left; max-height:130px; overflow-y:auto; margin:10px 0; }
#missed-wrap h3 { font-size:10px; color:#555; letter-spacing:.07em; text-transform:uppercase; margin-bottom:8px; }
.missed-item { font-size:11px; color:#666; padding:2px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
.end-btns { display:flex; gap:8px; margin-top:16px; }
.end-btns .btn { flex:1; }

#lb-screen .card { min-width:420px; max-width:520px; max-height:85vh; overflow-y:auto; }
#lb-tabs { display:flex; gap:6px; margin-bottom:16px; justify-content:center; flex-wrap:wrap; }
.lb-tab { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:7px; padding:5px 12px; cursor:pointer; font-size:11px; font-family:inherit; color:#666; transition:all .15s; }
.lb-tab:hover { color:#aaa; }
.lb-tab.active { border-color:#e8c366; color:#e8c366; background:rgba(232,195,102,0.1); }
.lb-row { display:flex; align-items:center; gap:10px; padding:8px 4px; border-bottom:1px solid rgba(255,255,255,0.05); }
.lb-rank { font-size:14px; font-weight:700; width:28px; text-align:center; }
.lb-rank.r1{color:#FFD700}.lb-rank.r2{color:#C0C0C0}.lb-rank.r3{color:#CD7F32}
.lb-name { flex:1; font-size:13px; color:#ddd; }
.lb-score { font-size:13px; font-weight:700; color:#e8c366; }
.lb-pct { font-size:10px; color:#555; margin-left:4px; }
.lb-empty { color:#444; font-size:13px; text-align:center; padding:24px 0; }

#tooltip { position:fixed; pointer-events:none; background:rgba(5,8,15,.95); border:1px solid rgba(255,255,255,.12); border-radius:7px; padding:5px 11px; font-size:12px; color:#ddd; z-index:200; white-space:nowrap; }
.hidden { display:none !important; }
#loading { position:fixed; inset:0; background:#0d1117; display:flex; align-items:center; justify-content:center; z-index:300; flex-direction:column; gap:12px; }
#loading p { color:#555; font-size:13px; letter-spacing:.06em; }
.spinner { width:36px; height:36px; border:3px solid rgba(255,255,255,0.08); border-top-color:#e8c366; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Chargement de la carte…</p></div>
<div id="tooltip" class="hidden"></div>

<!-- SETUP -->
<div id="setup-screen" class="overlay hidden">
 <div class="card" style="min-width:420px;max-width:520px">
  <h2>🌍 World Quiz</h2>
  <p>Nomme un maximum de pays avant la fin du temps</p>
  <div class="section-title">Ton nom</div>
  <div id="player-name-wrap"><input id="player-name" type="text" placeholder="Entre ton prénom…" maxlength="20" autocomplete="off"/></div>
  <div class="section-title">Région</div>
  <div id="region-grid"></div>
  <div class="section-title">Durée</div>
  <div class="time-opts">
   <button class="time-opt" data-min="5">5 min</button>
   <button class="time-opt selected" data-min="10">10 min</button>
   <button class="time-opt" data-min="15">15 min</button>
   <button class="time-opt" data-min="20">20 min</button>
  </div>
  <div class="custom-row"><label>Personnaliser :</label><input id="custom-min" type="number" min="1" max="60" placeholder="min"/></div>
  <div style="display:flex;gap:8px">
   <button class="btn gold" style="flex:1;padding:10px" onclick="showLeaderboard()">🏆 Classement</button>
   <button class="btn primary" style="flex:1.5;padding:10px;font-size:13px" onclick="startGame()">Démarrer →</button>
  </div>
 </div>
</div>

<!-- END -->
<div id="end-screen" class="overlay hidden">
 <div class="card">
  <h2 id="end-title">⏱ Temps écoulé !</h2>
  <div id="score-big"></div>
  <div id="score-sub"></div>
  <div id="found-list"></div>
  <div id="missed-wrap"><h3>Pays non trouvés</h3></div>
  <div class="end-btns">
   <button class="btn gold" onclick="showLeaderboard()">🏆</button>
   <button class="btn" onclick="showSetup()">⚙ Config</button>
   <button class="btn primary" onclick="restartSame()">↺ Rejouer</button>
  </div>
 </div>
</div>

<!-- LEADERBOARD -->
<div id="lb-screen" class="overlay hidden">
 <div class="card">
  <h2>🏆 Classement</h2><p>Meilleurs scores par région</p>
  <div id="lb-tabs"></div>
  <div id="lb-list"></div>
  <button class="btn" style="width:100%;margin-top:16px" onclick="hideLB()">← Retour</button>
 </div>
</div>

<div id="header">
 <h1>🌍 World Quiz</h1>
 <div id="stats">
  <div class="stat"><div class="stat-val" id="found-count">0</div><div class="stat-lbl">Trouvés</div></div>
  <div class="stat"><div class="stat-val" id="total-count">—</div><div class="stat-lbl">Total</div></div>
  <div class="stat"><div class="stat-val" id="timer-val">—</div><div class="stat-lbl">Temps</div></div>
  <div id="region-badge">Monde</div>
 </div>
 <div id="controls">
  <input type="text" id="input-box" placeholder="Nom d'un pays…" autocomplete="off" autocorrect="off" spellcheck="false"/>
  <button class="btn gold" onclick="showLeaderboard()">🏆</button>
  <button class="btn" onclick="giveUp()">⏹</button>
 </div>
</div>
<div id="progress-bar"><div id="progress-fill" style="width:0%"></div></div>
<div id="map-wrap"><svg id="world-svg"></svg></div>

// STATE
// ══════════════════════════════════════════════
let found = new Set(), timerInterval=null, timeLeft=600, totalTime=600;
let gameActive=false, selectedMinutes=10, selectedRegion="world";
let currentPlayer="", activeIso3=[], geoData=null;
let lbRegionFilter="world";

// ══════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════
function loadLB(){try{return JSON.parse(localStorage.getItem("wq_lb")||"[]")}catch(e){return[]}}
function saveLB(d){localStorage.setItem("wq_lb",JSON.stringify(d))}
function addScore(player,region,score,total,minutes){
  const lb=loadLB();
  lb.push({player,region,score,total,pct:Math.round(score/total*100),minutes,date:new Date().toLocaleDateString("fr-FR")});
  lb.sort((a,b)=>b.pct-a.pct||b.score-a.score);
  saveLB(lb);
}

// ══════════════════════════════════════════════
// NORMALIZE
// ══════════════════════════════════════════════
function norm(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[-']/g," ").trim();
}

// ══════════════════════════════════════════════
// D3 MAP
// ══════════════════════════════════════════════
const svg = d3.select("#world-svg");
let projection, path, zoom;

function initMap(geojson) {
  const W = document.getElementById("map-wrap").clientWidth;
  const H = Math.max(400, window.innerHeight - 120);
  svg.attr("viewBox", `0 0 ${W} ${H}`).style("height", H+"px");

  projection = d3.geoNaturalEarth1()
    .scale(W / 6.3)
    .translate([W/2, H/2]);
  path = d3.geoPath().projection(projection);

  // Ocean
  svg.append("path")
    .datum({type:"Sphere"})
    .attr("class","sphere")
    .attr("d", path);

  // Graticule
  svg.append("path")
    .datum(d3.geoGraticule()())
    .attr("class","graticule")
    .attr("d", path);

  // Countries
  svg.selectAll(".country")
    .data(geojson.features)
    .enter().append("path")
    .attr("class","country")
    .attr("d", path)
    .attr("id", d => "c-" + (d.properties.ISO_A3 || d.properties.iso_a3 || ""))
    .on("mouseover", function(event, d) {
      const iso = getIso(d);
      if (found.has(iso)) {
        const meta = COUNTRY_META[iso];
        const tt = document.getElementById("tooltip");
        tt.textContent = meta ? meta.n[0] : iso;
        tt.classList.remove("hidden");
      }
    })
    .on("mousemove", function(event) {
      const tt = document.getElementById("tooltip");
      tt.style.left = (event.clientX+14)+"px";
      tt.style.top = (event.clientY-10)+"px";
    })
    .on("mouseleave", () => document.getElementById("tooltip").classList.add("hidden"));

  // Zoom
  zoom = d3.zoom().scaleExtent([1,8]).on("zoom", e => {
    svg.selectAll(".country,.graticule,.sphere").attr("transform", e.transform);
    svg.selectAll(".pin-g").attr("transform", e.transform);
  });
  svg.call(zoom);
}

function getIso(d) {
  return d.properties.ISO_A3_EH || d.properties.ISO_A3 || d.properties.iso_a3 || "";
}

function refreshMap() {
  if (!geoData) return;
  svg.selectAll(".country").each(function(d) {
    const iso = getIso(d);
    const meta = COUNTRY_META[iso];
    const inScope = activeIso3.includes(iso);
    d3.select(this)
      .classed("active", inScope && !found.has(iso))
      .classed("found", found.has(iso))
      .classed("missed", false)
      .style("fill", found.has(iso) ? hexRgba(REGIONS[meta?.r||"world"].color, 0.72) : null)
      .style("stroke", found.has(iso) ? REGIONS[meta?.r||"world"].color : null)
      .style("stroke-width", found.has(iso) ? "0.7px" : null);
  });
  // Remove old pins
  svg.selectAll(".pin-g").remove();
}

function markFoundOnMap(iso) {
  const meta = COUNTRY_META[iso];
  if (!meta) return;
  const col = REGIONS[meta.r]?.color || "#30d158";

  svg.selectAll(".country")
    .filter(d => getIso(d) === iso)
    .classed("active", false)
    .classed("found", true)
    .style("fill", hexRgba(col, 0.72))
    .style("stroke", col)
    .style("stroke-width", "0.7px");

  // Pin at centroid
  const feat = geoData.features.find(d => getIso(d) === iso);
  if (feat) {
    try {
      const [cx, cy] = path.centroid(feat);
      if (isFinite(cx) && isFinite(cy)) {
        const g = svg.append("g").attr("class","pin-g").style("pointer-events","none");
        g.append("path")
          .attr("d", `M${cx},${cy-8}C${cx-4},${cy-8} ${cx-7},${cy-5} ${cx-7},${cy}C${cx-7},${cy+5} ${cx},${cy+11} ${cx},${cy+11}C${cx},${cy+11} ${cx+7},${cy+5} ${cx+7},${cy}C${cx+7},${cy-5} ${cx+4},${cy-8} ${cx},${cy-8}Z`)
          .attr("fill","#FF3B30").attr("stroke","white").attr("stroke-width","0.8");
        g.append("circle").attr("cx",cx).attr("cy",cy).attr("r",2.5).attr("fill","white").attr("opacity",0.85);
      }
    } catch(e) {}
  }
}

function hexRgba(hex, a) {
  if (!hex || hex[0]!=="#") return `rgba(100,160,255,${a})`;
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function revealMissed() {
  svg.selectAll(".country").each(function(d) {
    const iso = getIso(d);
    if (activeIso3.includes(iso) && !found.has(iso)) {
      d3.select(this).classed("missed",true)
        .style("fill","rgba(255,59,48,0.32)").style("stroke","rgba(255,59,48,0.65)").style("stroke-width","0.7px");
    }
  });
}

// ══════════════════════════════════════════════
// SETUP UI
// ══════════════════════════════════════════════
function buildRegionGrid() {
  const grid = document.getElementById("region-grid");
  grid.innerHTML = "";
  const counts = {};
  Object.entries(COUNTRY_META).forEach(([iso,m]) => { counts[m.r]=(counts[m.r]||0)+1; });
  const total = Object.keys(COUNTRY_META).length;
  Object.entries(REGIONS).forEach(([key,r]) => {
    const cnt = key==="world" ? total : (counts[key]||0);
    const btn = document.createElement("button");
    btn.className = "region-btn"+(key===selectedRegion?" selected":"");
    btn.innerHTML = `<span class="r-emoji">${r.emoji}</span>${r.label}<span class="r-count">${cnt} pays</span>`;
    btn.onclick = () => {
      document.querySelectorAll(".region-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedRegion = key;
    };
    grid.appendChild(btn);
  });
}

document.querySelectorAll(".time-opt").forEach(b=>{
  b.addEventListener("click",function(){
    document.querySelectorAll(".time-opt").forEach(x=>x.classList.remove("selected"));
    this.classList.add("selected");
    selectedMinutes=parseInt(this.dataset.min);
    document.getElementById("custom-min").value="";
  });
});
document.getElementById("custom-min").addEventListener("input",function(){
  if(this.value){document.querySelectorAll(".time-opt").forEach(x=>x.classList.remove("selected"));selectedMinutes=parseInt(this.value)||10;}
});

buildRegionGrid();

// ══════════════════════════════════════════════
// GAME
// ══════════════════════════════════════════════
function startGame() {
  const custom = document.getElementById("custom-min").value;
  if (custom) selectedMinutes = parseInt(custom)||10;
  currentPlayer = document.getElementById("player-name").value.trim() || "Anonyme";
  totalTime = selectedMinutes*60; timeLeft = totalTime;
  found = new Set(); gameActive = true;

  activeIso3 = Object.entries(COUNTRY_META)
    .filter(([,m]) => selectedRegion==="world" || m.r===selectedRegion)
    .map(([iso]) => iso);

  document.getElementById("found-count").textContent = "0";
  document.getElementById("total-count").textContent = activeIso3.length;
  document.getElementById("timer-val").textContent = formatTime(timeLeft);
  document.getElementById("timer-val").className = "stat-val";
  document.getElementById("region-badge").textContent = REGIONS[selectedRegion].emoji+" "+REGIONS[selectedRegion].label;
  document.getElementById("progress-fill").style.width = "0%";

  refreshMap();
  document.getElementById("setup-screen").classList.add("hidden");
  document.getElementById("end-screen").classList.add("hidden");
  document.getElementById("input-box").value = "";
  document.getElementById("input-box").focus();

  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    timeLeft--;
    const tv=document.getElementById("timer-val");
    tv.textContent=formatTime(timeLeft);
    tv.className="stat-val"+(timeLeft<=30?" urgent":"");
    document.getElementById("progress-fill").style.width=(found.size/activeIso3.length*100)+"%";
    if(timeLeft<=0) endGame();
  },1000);
}

function formatTime(s){return`${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`}

document.getElementById("input-box").addEventListener("input",function(){
  if(!gameActive) return;
  const val=norm(this.value);
  if(val.length<2) return;
  for(const iso of activeIso3){
    if(found.has(iso)) continue;
    const meta=COUNTRY_META[iso];
    if(!meta) continue;
    for(const name of meta.n){
      if(norm(name)===val){
        found.add(iso);
        markFoundOnMap(iso);
        document.getElementById("found-count").textContent=found.size;
        document.getElementById("progress-fill").style.width=(found.size/activeIso3.length*100)+"%";
        this.value="";
        this.classList.add("correct");
        setTimeout(()=>this.classList.remove("correct"),400);
        if(found.size===activeIso3.length) endGame(true);
        return;
      }
    }
  }
});

function endGame(perfect=false){
  clearInterval(timerInterval); gameActive=false;
  document.getElementById("tooltip").classList.add("hidden");
  addScore(currentPlayer,selectedRegion,found.size,activeIso3.length,selectedMinutes);
  revealMissed();

  const pct=Math.round(found.size/activeIso3.length*100);
  document.getElementById("end-title").textContent=perfect?"🎉 Parfait !":"⏱ Temps écoulé !";
  document.getElementById("score-big").textContent=found.size+" / "+activeIso3.length;
  document.getElementById("score-sub").textContent=`${pct}% — ${currentPlayer} — ${REGIONS[selectedRegion].label} — ${selectedMinutes} min`;

  const fl=document.getElementById("found-list");
  fl.innerHTML="";
  [...found].forEach(iso=>{
    const meta=COUNTRY_META[iso];
    const span=document.createElement("span");
    span.className="found-tag";
    span.textContent=meta?meta.n[0]:iso;
    fl.appendChild(span);
  });

  const ml=document.getElementById("missed-wrap");
  ml.innerHTML=`<h3>Pays non trouvés (${activeIso3.length-found.size})</h3>`;
  activeIso3.filter(iso=>!found.has(iso)).forEach(iso=>{
    const meta=COUNTRY_META[iso];
    const div=document.createElement("div");
    div.className="missed-item";
    div.textContent=meta?meta.n[0]:iso;
    ml.appendChild(div);
  });

  document.getElementById("end-screen").classList.remove("hidden");
}

function giveUp(){if(gameActive)endGame();}
function showSetup(){
  clearInterval(timerInterval);gameActive=false;
  buildRegionGrid();
  ["end-screen","lb-screen"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById("setup-screen").classList.remove("hidden");
}
function restartSame(){document.getElementById("end-screen").classList.add("hidden");startGame();}

// ══════════════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════════════
function showLeaderboard(){
  lbRegionFilter=selectedRegion||"world";
  renderLB();
  ["setup-screen","end-screen"].forEach(id=>document.getElementById(id).classList.add("hidden"));
  document.getElementById("lb-screen").classList.remove("hidden");
}
function hideLB(){
  document.getElementById("lb-screen").classList.add("hidden");
  if(!gameActive) document.getElementById("setup-screen").classList.remove("hidden");
}
function renderLB(){
  const tabs=document.getElementById("lb-tabs");
  tabs.innerHTML="";
  Object.entries(REGIONS).forEach(([key,r])=>{
    const btn=document.createElement("button");
    btn.className="lb-tab"+(key===lbRegionFilter?" active":"");
    btn.textContent=r.emoji+" "+r.label;
    btn.onclick=()=>{lbRegionFilter=key;renderLB();};
    tabs.appendChild(btn);
  });
  const lb=loadLB();
  const filtered=lb.filter(e=>lbRegionFilter==="world"?true:e.region===lbRegionFilter);
  const list=document.getElementById("lb-list");
  list.innerHTML="";
  if(!filtered.length){list.innerHTML=`<div class="lb-empty">Aucun score encore.</div>`;return;}
  filtered.slice(0,20).forEach((e,i)=>{
    const row=document.createElement("div");row.className="lb-row";
    const rc=i===0?"r1":i===1?"r2":i===2?"r3":"";
    const med=i===0?"🥇":i===1?"🥈":i===2?"🥉":"#"+(i+1);
    row.innerHTML=`<div class="lb-rank ${rc}">${med}</div>
      <div style="flex:1"><div class="lb-name">${e.player}</div>
      <div style="display:flex;gap:8px;margin-top:2px"><span style="font-size:10px;color:#555">${REGIONS[e.region]?.emoji||""} ${REGIONS[e.region]?.label||e.region} · ${e.minutes}min · ${e.date}</span></div></div>
      <div><span class="lb-score">${e.score}/${e.total}</span><span class="lb-pct">${e.pct}%</span></div>`;
    list.appendChild(row);
  });
}

// ══════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════
async function boot(){
  try {
    const world = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(r=>r.json());
    const geojson = topojson.feature(world, world.objects.countries);
    geojson.features.forEach(f=>{ f.properties.ISO_A3 = numericToIso3(f.id); });
    geoData = geojson;
    initMap(geojson);
    document.getElementById("loading").classList.add("hidden");
    document.getElementById("setup-screen").classList.remove("hidden");
    buildRegionGrid();
  } catch(e) {
    document.getElementById("loading").innerHTML=`<div class="spinner"></div><p style="color:#ff6b6b">Erreur réseau. Rechargez la page.</p>`;
  }
}
boot();
